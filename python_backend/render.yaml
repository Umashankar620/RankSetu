services:
  - type: web
    name: ranksetu-python
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        value: YOUR_MYSQL_HOST
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: YOUR_MYSQL_USER
      - key: DB_PASSWORD
        value: YOUR_MYSQL_PASSWORD
      - key: DB_NAME
        value: neet_db
      - key: ALLOWED_ORIGINS
        value: https://ranksetu.vercel.app,https://ranksetu.in
        