services:
  - type: web
    name: ranksetu-python
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        value: YOUR_TIDB_HOST
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        value: YOUR_TIDB_USER
      - key: DB_PASSWORD
        value: YOUR_TIDB_PASSWORD
      - key: DB_NAME
        value: ranksetu
      - key: ALLOWED_ORIGINS
        value: https://ranksetu.in,https://www.ranksetu.in,https://ranksetu.vercel.app